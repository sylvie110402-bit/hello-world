<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SYLVIE'S STUDIO</title>
    <style>
        /* --- 1. 整体氛围设置 --- */
        body { 
            background-color: #fafafa; /* 高级灰白 */
            color: #1a1a1a;
            font-family: 'Inter', -apple-system, sans-serif; 
            line-height: 1.8;
            margin: 0;
            padding: 0;
        }

        /* --- 2. 容器：给网页留出呼吸感 --- */
        .container {
            max-width: 800px;
            margin: 100px auto; /* 上下留白100px，左右居中 */
            padding: 0 40px;
        }

        /* --- 3. 标题：智感冷淡风的核心 --- */
        h1 { 
            font-weight: 300; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        /* --- 4. 按钮样式 --- */
        button { 
            background: none;
            border: 1px solid #1a1a1a;
            padding: 12px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        button:hover {
            background: #1a1a1a;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SYLVIE'S STUDIO</h1>
        
        <p>设计、逻辑与艺术的交汇处。</p >
        
        <p style="color: #666; font-size: 14px;">
            在这里，我记录关于展会设计与数字化流程的每一次探索。
        </p >

        <button onclick="alert('即将开启深度探索')">进入作品集</button>
    </div>
</body>
</html>
